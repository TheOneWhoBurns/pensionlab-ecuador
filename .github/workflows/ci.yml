name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Playwright QA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start static file server
        run: npx serve . -p 8080 &
        env:
          BASE_URL: http://localhost:8080

      - name: Wait for server
        run: npx wait-on http://localhost:8080 --timeout 15000

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: http://localhost:8080

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync ./ s3://pensionlabec.com --delete \
            --exclude '.git/*' \
            --exclude 'node_modules/*' \
            --exclude 'tests/*' \
            --exclude 'playwright-report/*' \
            --exclude 'test-results/*' \
            --exclude '.github/*' \
            --exclude 'package*.json' \
            --exclude 'playwright.config.js'

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id EV1SL8GAZMRQ6 --paths "/*"
